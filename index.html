<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABR_VPN Тарифы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color-scheme: dark;
        }
        .header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .header h1 { margin: 0; font-size: 26px; color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
        .header p { margin: 8px 0 0; font-size: 14px; opacity: 0.7; }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card:active { 
            transform: scale(0.96); 
            background: rgba(255, 255, 255, 0.1); 
            border-color: #eab308;
        }
        
        .info h2 { margin: 0; font-size: 18px; font-weight: 600; }
        .info p { margin: 6px 0 0; font-size: 13px; color: #a1a1aa; }
        .price { font-size: 18px; font-weight: bold; color: #22c55e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SABR_VPN</h1>
        <p>Выберите премиум подписку</p>
    </div>

    <div class="card" onclick="selectTariff(30)">
        <div class="info">
            <h2>🥉 1 Месяц</h2>
            <p>Базовый доступ</p>
        </div>
        <div class="price">149 ₽</div>
    </div>

    <div class="card" onclick="selectTariff(90)">
        <div class="info">
            <h2>🥈 3 Месяца</h2>
            <p>Выгодный старт</p>
        </div>
        <div class="price">399 ₽</div>
    </div>

    <div class="card" onclick="selectTariff(180)">
        <div class="info">
            <h2>🥇 6 Месяцев</h2>
            <p>Оптимальный выбор</p>
        </div>
        <div class="price">749 ₽</div>
    </div>

    <div class="card" onclick="selectTariff(365)">
        <div class="info">
            <h2>🏆 12 Месяцев</h2>
            <p>Максимальная экономия</p>
        </div>
        <div class="price">1290 ₽</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // 🔴 ВАЖНО: ВПИШИТЕ В КАВЫЧКИ ЮЗЕРНЕЙМ ВАШЕГО БОТА (без @)
        const BOT_USERNAME = "magich06_vpn_bot"; 

        function selectTariff(days) {
            tg.HapticFeedback.impactOccurred('light'); // Вибрация при клике
            let link = `https://t.me/${BOT_USERNAME}?start=buy_${days}`;
            tg.openTelegramLink(link);
        }
    </script>
</body>
</html>
